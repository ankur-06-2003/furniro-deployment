apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: three-tier
  labels:
    app: backend           
spec:
  type: ClusterIP
  selector:
    role: api               
  ports:
    - name: http            
      port: 8000
      targetPort: 8000

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-metrics
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend           
  namespaceSelector:
    matchNames:
      - three-tier
  endpoints:
    - port: http             
      path: /metrics
      interval: 15s
