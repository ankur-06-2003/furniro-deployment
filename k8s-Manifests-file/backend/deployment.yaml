apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: three-tier
  labels:
    role: api
    env: production
  # annotations:
  #   argocd.argoproj.io/sync-wave: "2"

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      role: api
  template:
    metadata:
      labels:
        role: api
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-status: "update"
        vault.hashicorp.com/role: "backend-role"
        vault.hashicorp.com/agent-inject-secret-app-secrets: "secret/data/furniro/backend/secrets"
        vault.hashicorp.com/agent-inject-template-app-secrets: |
          {{- with secret "secret/data/furniro/backend/secrets" -}}
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          export CLOUDINARY_CLOUD_NAME="{{ .Data.data.CLOUDINARY_CLOUD_NAME }}"
          export CLOUDINARY_API_KEY="{{ .Data.data.CLOUDINARY_API_KEY }}"
          export MONGO_USERNAME="{{ .Data.data.MONGO_USERNAME }}"
          export MONGO_PASSWORD="{{ .Data.data.MONGO_PASSWORD }}"
          {{- end }}
    spec:
      # imagePullSecrets:
      # - name:  gcp-registry-secret
      serviceAccountName: backend-sa
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/project-9a74d1a5-edac-4cb9-a0b/furniro/furniro-backend:1.0.6
        imagePullPolicy: IfNotPresent
        env:
          # MongoDB Connection
         
          - name: MONGO_URI
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: MONGODB_URI
          
          # App Configuration
          - name: NODE_ENV
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: NODE_ENV
          
          - name: PORT
            value: "8000"
          
          # Frontend URL for CORS
          - name: FRONTEND_URL
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: FRONTEND_URL
                
          - name: BACKEND_URL
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: BACKEND_URL
          
          # Secrets are now injected from Vault via agent-inject annotations
          # See /vault/secrets/app-secrets file injected by Vault Agent
        command: ["/bin/sh"]
          args:
            - -c
            - |
              if [ -f /vault/secrets/app-secrets ]; then
                source /vault/secrets/app-secrets
                echo "Secrets loaded."
              else
                echo "Warning: Secrets file not found."
              fi
        
        ports:
        - containerPort: 8000
          name: http
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      
      volumes:
      - name: tmp
        emptyDir: {}