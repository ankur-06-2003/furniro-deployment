apiVersion: apps/v1
kind: StatefulSet
metadata: 
  namespace: three-tier
  name: mongodb
  labels:
    app: mongodb
    env: production
  annotations:
    argocd.argoproj.io/sync-wave: "1" 
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels: 
        app: mongodb
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mongodb
              topologyKey: kubernetes.io/hostname
      
      # securityContext:
      #   fsGroup: 999
      
      containers:
      - name: mongodb
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 27017
          name: mongodb
        
        env: 
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: mongo-sec
                key: username
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongo-sec
                key: password
          - name: MONGO_INITDB_DATABASE
            value: furniro
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - mongosh --eval "db.adminCommand('ping')" --quiet
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - mongosh --eval "db.adminCommand('ping')" --quiet
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # securityContext:
        #   runAsNonRoot: true
        #   runAsUser: 999
        #   allowPrivilegeEscalation: false
        #   readOnlyRootFilesystem: false
        #   capabilities:
        #     drop:
        #       - ALL
        
        volumeMounts:
          - name: mongo-volume
            mountPath: /data/db
          - name: mongo-config
            mountPath: /etc/mongod
      
      volumes: 
      - name: mongo-volume
        persistentVolumeClaim:
          claimName: mongo-volume-claim
      
      - name: mongo-config
        configMap:
          name: mongo-config
          optional: true